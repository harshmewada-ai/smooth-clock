<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinematic Chrono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@200..900&family=Space+Grotesk:wght@300..700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        html,
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        /* --- Ambient Background --- */
        .ambient-light {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000000 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
            will-change: transform;
            transform: translateZ(0);
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #06b6d4;
            top: 40%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate3d(0, 0, 0) scale(1);
            }

            33% {
                transform: translate3d(30px, -50px, 0) scale(1.1);
            }

            66% {
                transform: translate3d(-20px, 20px, 0) scale(0.9);
            }
        }

        /* --- Main Layout --- */
        .app-container {
            position: relative;
            z-index: 10;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4vh 4vw 2vh;
            height: 80px;
        }

        .logo-text {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .icon-btn:hover,
        .icon-btn:active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: scale(0.95);
        }

        /* --- Swipe Container --- */
        .swipe-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        .views-wrapper {
            display: flex;
            height: 100%;
            width: 300%;
            transform: translate3d(0, 0, 0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
            backface-visibility: hidden;
        }

        .view {
            width: 33.333%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 4vw;
            position: relative;
        }

        /* --- UNIFIED DISPLAY STYLE --- */
        .chrono-display {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(4rem, 18vw, 14rem);
            font-weight: 200;
            line-height: 0.9;
            letter-spacing: -0.02em;
            background: linear-gradient(to bottom, #ffffff 0%, #a5a5a5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.1));
            text-align: center;
            position: relative;
            font-variant-numeric: tabular-nums;
        }

        .chrono-sub {
            font-size: 0.25em;
            font-weight: 300;
            color: var(--text-secondary);
            -webkit-text-fill-color: var(--text-secondary);
            margin-left: 0.1em;
            vertical-align: super;
            font-family: 'Space Grotesk', monospace;
        }

        .chrono-label {
            margin-top: 3vh;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-weight: 500;
        }

        /* --- CONTROLS --- */
        .controls-container {
            margin-top: 5vh;
            display: flex;
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease 0.3s forwards;
        }

        .btn-cinematic {
            padding: 18px 40px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 140px;
            text-align: center;
            position: relative;
            overflow: hidden;
            will-change: transform, opacity;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .btn-cinematic::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-cinematic:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-cinematic:active {
            transform: scale(0.95);
        }

        .btn-cinematic.primary {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        .btn-cinematic.primary:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .btn-cinematic:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- LAPS & PRESETS --- */
        .secondary-panel {
            margin-top: 4vh;
            width: 100%;
            max-width: 500px;
            max-height: 25vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 10px;
            opacity: 0;
            animation: fadeUp 0.6s ease 0.4s forwards;
        }

        .secondary-panel::-webkit-scrollbar {
            width: 4px;
        }

        .secondary-panel::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            font-family: 'Space Grotesk', monospace;
            font-size: 1.1rem;
            color: var(--text-secondary);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .list-item.fastest {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        .list-item.slowest {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
        }

        /* --- TIMER INPUTS --- */
        .timer-inputs {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 2vh;
        }

        .time-input-box {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-input {
            width: clamp(100px, 20vw, 160px);
            height: clamp(120px, 18vh, 180px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: clamp(3rem, 10vw, 5rem);
            text-align: center;
            font-family: 'Outfit', sans-serif;
            font-weight: 200;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            -moz-appearance: textfield;
        }

        .time-input::-webkit-outer-spin-button,
        .time-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .time-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
        }

        .input-label {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
        }

        .timer-divider {
            font-size: 3rem;
            color: var(--text-secondary);
            font-weight: 200;
            margin-top: -40px;
            opacity: 0.5;
        }

        /* --- INDICATORS --- */
        .page-indicators {
            position: absolute;
            bottom: 4vh;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }

        .indicator.active {
            width: 32px;
            border-radius: 16px;
            background: var(--text-primary);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* --- GESTURE HINT --- */
        .gesture-hint {
            position: absolute;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.4;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translate3d(0, 20px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate3d(-20px, 0, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        .view.active-view .chrono-display {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* --- HIDDEN UTIL --- */
        .hidden {
            display: none !important;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .btn-cinematic {
                padding: 16px 30px;
                font-size: 0.9rem;
                min-width: 120px;
            }

            .timer-inputs {
                gap: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="ambient-light">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-container">
        <header>
            <div class="logo-text">Chrono</div>
            <div class="controls">
                <button class="icon-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                    </svg>
                </button>
                <button class="icon-btn" onclick="toggleFormat()" title="Toggle Format">
                    <span id="format-badge" style="font-size: 10px; font-weight: 700;">24H</span>
                </button>
            </div>
        </header>

        <div class="swipe-container" id="swipe-area">
            <div class="views-wrapper" id="views-wrapper">

                <!-- VIEW 1: CLOCK -->
                <section class="view active-view" data-index="0">
                    <div class="chrono-display" id="clock-display">
                        12:00<span class="chrono-sub">00</span>
                    </div>
                    <div class="chrono-label" id="date-display">Monday, January 1</div>
                    <div class="chrono-label" style="margin-top: 1vh; font-size: 0.8rem; color: var(--accent);"
                        id="greeting">Good Evening</div>
                </section>

                <!-- VIEW 2: STOPWATCH -->
                <section class="view" data-index="1">
                    <div class="chrono-display" id="sw-display">
                        00:00<span class="chrono-sub">.00</span>
                    </div>
                    <div class="chrono-label">Stopwatch</div>

                    <div class="controls-container">
                        <button class="btn-cinematic" id="sw-lap-btn" onclick="handleLapReset()" disabled>Lap</button>
                        <button class="btn-cinematic primary" id="sw-toggle-btn"
                            onclick="toggleStopwatch()">Start</button>
                    </div>

                    <div class="secondary-panel" id="sw-laps"></div>
                </section>

                <!-- VIEW 3: TIMER -->
                <section class="view" data-index="2">
                    <!-- Input Mode -->
                    <div id="timer-input-mode">
                        <div class="timer-inputs">
                            <div class="time-input-box">
                                <input type="number" class="time-input" id="timer-min" placeholder="00" min="0" max="99"
                                    onchange="validateInput(this)">
                                <span class="input-label">Min</span>
                            </div>
                            <span class="timer-divider">:</span>
                            <div class="time-input-box">
                                <input type="number" class="time-input" id="timer-sec" placeholder="00" min="0" max="59"
                                    onchange="validateInput(this)">
                                <span class="input-label">Sec</span>
                            </div>
                        </div>
                    </div>

                    <!-- Run Mode -->
                    <div id="timer-run-mode" class="hidden">
                        <div class="chrono-display" id="timer-display">00:00</div>
                        <div class="chrono-label" id="timer-status">Remaining</div>
                    </div>

                    <div class="controls-container">
                        <button class="btn-cinematic" id="timer-reset-btn" onclick="resetTimer()"
                            style="opacity: 0; pointer-events: none;">Reset</button>
                        <button class="btn-cinematic primary" id="timer-toggle-btn"
                            onclick="handleTimer()">Start</button>
                    </div>

                    <div class="secondary-panel" id="timer-presets">
                        <div class="list-item" onclick="setTimer(1, 0)">
                            <span>Quick Timer</span>
                            <span>1:00</span>
                        </div>
                        <div class="list-item" onclick="setTimer(5, 0)">
                            <span>Coffee Break</span>
                            <span>5:00</span>
                        </div>
                        <div class="list-item" onclick="setTimer(10, 0)">
                            <span>Focus Session</span>
                            <span>10:00</span>
                        </div>
                        <div class="list-item" onclick="setTimer(25, 0)">
                            <span>Pomodoro</span>
                            <span>25:00</span>
                        </div>
                    </div>
                </section>

            </div>
        </div>

        <div class="page-indicators">
            <div class="indicator active" onclick="goToView(0)"></div>
            <div class="indicator" onclick="goToView(1)"></div>
            <div class="indicator" onclick="goToView(2)"></div>
        </div>

        <div class="gesture-hint">Two finger swipe to navigate</div>
    </div>

    <script>
        // --- STATE ---
        let currentView = 0;
        let is24Hour = true;
        const totalViews = 3;

        // --- SWIPE LOGIC (2 FINGER) ---
        const swipeArea = document.getElementById('swipe-area');
        const wrapper = document.getElementById('views-wrapper');
        let startX = 0;
        let startY = 0;
        let isDragging = false;
        let touchCount = 0;

        let ticking = false;

        swipeArea.addEventListener('touchstart', (e) => {
            touchCount = e.touches.length;
            if (touchCount === 2) {
                isDragging = true;
                startX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                startY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                wrapper.style.transition = 'none';
            }
        }, { passive: false });

        swipeArea.addEventListener('touchmove', (e) => {
            if (!isDragging || touchCount !== 2) return;
            e.preventDefault();

            const currentX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const diffX = currentX - startX;
            const offset = -currentView * (100 / 3) + (diffX / window.innerWidth * 100 / 3);

            if (!ticking) {
                requestAnimationFrame(() => {
                    wrapper.style.transform = `translate3d(${offset}%, 0, 0)`;
                    ticking = false;
                });
                ticking = true;
            }
        }, { passive: false });

        swipeArea.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            touchCount = 0;
            wrapper.style.transition = 'transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';

            // Determine direction
            const transform = wrapper.style.transform;
            const match = transform.match(/translate3d\(([-\d.]+)%,/);
            if (match) {
                const currentOffset = parseFloat(match[1]);
                const baseOffset = -currentView * 100 / 3;
                const diff = currentOffset - baseOffset;

                if (diff < -5 && currentView < totalViews - 1) {
                    goToView(currentView + 1);
                } else if (diff > 5 && currentView > 0) {
                    goToView(currentView - 1);
                } else {
                    goToView(currentView);
                }
            }
        });

        // Mouse wheel support for desktop trackpad (2 finger swipe)
        let wheelAccumulated = 0;
        let wheelCooldown = false;

        swipeArea.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                e.preventDefault();
                if (wheelCooldown) return;

                wheelAccumulated += e.deltaX;

                if (Math.abs(wheelAccumulated) > 50) {
                    if (wheelAccumulated > 0 && currentView < totalViews - 1) {
                        goToView(currentView + 1);
                        triggerCooldown();
                    } else if (wheelAccumulated < 0 && currentView > 0) {
                        goToView(currentView - 1);
                        triggerCooldown();
                    }
                }
            } else {
                wheelAccumulated = 0;
            }
        }, { passive: false });

        function triggerCooldown() {
            wheelCooldown = true;
            wheelAccumulated = 0;
            setTimeout(() => { wheelCooldown = false; }, 800);
        }

        function goToView(index) {
            currentView = Math.max(0, Math.min(index, totalViews - 1));
            requestAnimationFrame(() => {
                wrapper.style.transform = `translate3d(-${currentView * 33.333}%, 0, 0)`;
            });

            // Update indicators
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === currentView);
            });

            // Update view classes for animations
            document.querySelectorAll('.view').forEach((view, i) => {
                view.classList.toggle('active-view', i === currentView);
            });
        }

        // --- CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            // Greeting
            const h = now.getHours();
            let greet = "Good Evening";
            if (h < 12) greet = "Good Morning";
            else if (h < 18) greet = "Good Afternoon";
            document.getElementById('greeting').textContent = greet;

            // Format
            if (!is24Hour) hours = hours % 12 || 12;
            hours = String(hours).padStart(2, '0');

            document.getElementById('clock-display').innerHTML =
                `${hours}:${minutes}<span class="chrono-sub">${seconds}</span>`;

            // Date
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date-display').textContent =
                now.toLocaleDateString('en-US', options);
        }

        setInterval(updateClock, 1000);
        updateClock();

        function toggleFormat() {
            is24Hour = !is24Hour;
            document.getElementById('format-badge').textContent = is24Hour ? '24H' : '12H';
            updateClock();
        }

        // --- STOPWATCH LOGIC ---
        let swRunning = false;
        let swStartTime;
        let swElapsed = 0;
        let swAnimation;
        let laps = [];

        function toggleStopwatch() {
            const btn = document.getElementById('sw-toggle-btn');
            const lapBtn = document.getElementById('sw-lap-btn');

            if (!swRunning) {
                swRunning = true;
                swStartTime = Date.now() - swElapsed;
                swLoop();
                btn.textContent = "Stop";
                btn.classList.remove('primary');
                lapBtn.disabled = false;
                lapBtn.textContent = "Lap";
            } else {
                swRunning = false;
                cancelAnimationFrame(swAnimation);
                btn.textContent = "Resume";
                btn.classList.add('primary');
                lapBtn.textContent = "Reset";
            }
        }

        function swLoop() {
            if (!swRunning) return;
            swElapsed = Date.now() - swStartTime;
            updateSwDisplay();
            swAnimation = requestAnimationFrame(swLoop);
        }

        function updateSwDisplay() {
            const ms = Math.floor((swElapsed % 1000) / 10);
            const s = Math.floor((swElapsed / 1000) % 60);
            const m = Math.floor((swElapsed / (1000 * 60)) % 60);

            document.getElementById('sw-display').innerHTML =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}<span class="chrono-sub">.${String(ms).padStart(2, '0')}</span>`;
        }

        function handleLapReset() {
            const lapBtn = document.getElementById('sw-lap-btn');

            if (swRunning) {
                const current = swElapsed;
                const lastLap = laps.length > 0 ? laps[laps.length - 1].total : 0;
                const lapTime = current - lastLap;
                laps.push({ total: current, lap: lapTime });
                renderLaps();
            } else {
                swElapsed = 0;
                laps = [];
                updateSwDisplay();
                document.getElementById('sw-toggle-btn').textContent = "Start";
                lapBtn.disabled = true;
                lapBtn.textContent = "Lap";
                document.getElementById('sw-laps').innerHTML = '';
            }
        }

        function renderLaps() {
            const list = document.getElementById('sw-laps');
            list.innerHTML = '';

            let min = Infinity, max = 0;
            laps.forEach(l => {
                if (l.lap < min) min = l.lap;
                if (l.lap > max) max = l.lap;
            });

            [...laps].reverse().forEach((l, i) => {
                const realIdx = laps.length - i;
                const div = document.createElement('div');
                div.className = 'list-item';
                if (laps.length > 2) {
                    if (l.lap === min) div.classList.add('fastest');
                    if (l.lap === max) div.classList.add('slowest');
                }

                const format = (ms) => {
                    const m = Math.floor(ms / 60000);
                    const s = Math.floor((ms % 60000) / 1000);
                    const mil = Math.floor((ms % 1000) / 10);
                    return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(mil).padStart(2, '0')}`;
                };

                div.innerHTML = `<span>Lap ${realIdx}</span><span>${format(l.lap)}</span>`;
                list.appendChild(div);
            });
        }

        // --- TIMER LOGIC ---
        let timerInterval;
        let totalSecs = 0;
        let remainingSecs = 0;
        let timerRunning = false;

        function validateInput(input) {
            let val = parseInt(input.value) || 0;
            if (input.id === 'timer-sec' && val > 59) val = 59;
            if (val < 0) val = 0;
            input.value = String(val).padStart(2, '0');
        }

        function setTimer(m, s) {
            document.getElementById('timer-min').value = String(m).padStart(2, '0');
            document.getElementById('timer-sec').value = String(s).padStart(2, '0');
            handleTimer();
        }

        function handleTimer() {
            const btn = document.getElementById('timer-toggle-btn');
            const resetBtn = document.getElementById('timer-reset-btn');

            if (!timerRunning) {
                if (remainingSecs === 0) {
                    const m = parseInt(document.getElementById('timer-min').value) || 0;
                    const s = parseInt(document.getElementById('timer-sec').value) || 0;
                    totalSecs = m * 60 + s;
                    remainingSecs = totalSecs;
                }

                if (remainingSecs <= 0) return;

                timerRunning = true;
                document.getElementById('timer-input-mode').classList.add('hidden');
                document.getElementById('timer-run-mode').classList.remove('hidden');
                document.getElementById('timer-presets').classList.add('hidden');

                resetBtn.style.opacity = '1';
                resetBtn.style.pointerEvents = 'all';

                btn.textContent = "Pause";
                btn.classList.remove('primary');

                updateTimerDisplay();
                timerInterval = setInterval(() => {
                    remainingSecs--;
                    updateTimerDisplay();
                    if (remainingSecs <= 0) {
                        clearInterval(timerInterval);
                        timerRunning = false;
                        btn.textContent = "Done";
                        document.getElementById('timer-status').textContent = "Completed";
                        document.getElementById('timer-status').style.color = '#4ade80';
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
                timerRunning = false;
                btn.textContent = "Resume";
                btn.classList.add('primary');
                document.getElementById('timer-status').textContent = "Paused";
                document.getElementById('timer-status').style.color = '#fbbf24';
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainingSecs / 60);
            const s = remainingSecs % 60;
            document.getElementById('timer-display').textContent =
                `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerRunning = false;
            remainingSecs = 0;
            totalSecs = 0;

            document.getElementById('timer-input-mode').classList.remove('hidden');
            document.getElementById('timer-run-mode').classList.add('hidden');
            document.getElementById('timer-presets').classList.remove('hidden');

            document.getElementById('timer-min').value = '';
            document.getElementById('timer-sec').value = '';

            const btn = document.getElementById('timer-toggle-btn');
            btn.textContent = "Start";
            btn.classList.add('primary');

            const resetBtn = document.getElementById('timer-reset-btn');
            resetBtn.style.opacity = '0';
            resetBtn.style.pointerEvents = 'none';

            document.getElementById('timer-status').textContent = "Remaining";
            document.getElementById('timer-status').style.color = 'var(--text-secondary)';
        }

        // --- FULLSCREEN ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // --- KEYBOARD SHORTCUTS ---
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                if (currentView === 1) toggleStopwatch();
                if (currentView === 2) handleTimer();
            }
            if (e.code === 'KeyF') toggleFullscreen();
            if (e.code === 'ArrowRight') goToView(Math.min(currentView + 1, totalViews - 1));
            if (e.code === 'ArrowLeft') goToView(Math.max(currentView - 1, 0));
        });
    </script>
</body>

</html>
